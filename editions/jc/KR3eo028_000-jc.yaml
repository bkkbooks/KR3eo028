body:
  text: 軒轅黃帝治病秘法事例凡遇正月元旦用三牲酒禮祭之設立子亥二時祭軒轅黃帝神位禮拜弟子某人祭文入意思真慕道想丹華滌盧澄心以期輕舉濟人助國立功為先凡用所祈尅獲通感天上天下咸乞聞知先用新筆一枝京墨一塊向太陽咒曰赫赫陽陽日出東方神筆在手萬病消亡次用好醋研墨染筆毫上用筆於香菸頂燻之咒曰日出東方毒如蛇不作膿不作血隨著日氣自消滅急急如律令某年月日弟子某人稽首頓首仰啟祖師軒轅黃帝聖神某切為濟人助國立功為先以今遵稟真科奉行秘書傳以救人為本同躋壽域伏望遙降至真先生氣灌注身心令某書篆速遂通靈凡有禱祈克獲通感下情不勝皈命虔禱之至事例畢𫩠飠谷𫩠飠臣𫩠飠看此三字治一切無名腫毒於疾處書之𫩠𩚪此一字治蠍螫於疾處書之𫩠飠食此一字治婦人室女經脈不通並乳腫癰服貼之𫩠者食此一字治人身虎咬書紙上燒灰荊芥湯送下𫩠雍食此一字治蛇咬疼處書之婦人吹奶服之貼之𫩠扌食此一字治蛇咬疼處書之𫩠嬰食此一字治狗咬書紙上油煎服之𫩠𫗓此一字治肚疼書紙上燒灰服之𫩠飠系此一字治婦人吹妳或燒灰服之或貼之𫩠飠眷此一字治人遍身疼痛書紙上燒灰服之𫩠飠化此一字治癰疽書紙上燒灰服之貼之𫩠耳食此一字治辟邪書紙上頂帶三日燒灰服之𫩠矝此一字治破傷風書紙上燒灰服之並貼之𫩠捂食此一字治火燒瘡服貼之𫩠𤝰此一字治虎咬書紙上油煎貼之𫩠聆此一字治氣勞於疼處書之𫩠掩此一字治辟邪書紙上帶之𫩠飠食此一字治心疾書紙上燒灰服之及治腰脅疼書之𫩠者食此一字治傷熱書紙上燒灰服之𫩠嬰食此一字治人咬書紙上燒灰服之貼之𫩠䭃此一字治發背疔瘡於患處書之𫩠餉此一字治小兒肚疾啼哭於腳心男左女右書之𫩠飠祭此一字治虎咬於疾上書之𫩠餌此一字治小兒夜啼書紙上男左女右腳底貼之𫩠飠學此一字治虎狼辟邪書紙上隨身帶之𫩠飠勑此一字治魑魅魍魎纏身一切病疾書紙上服之𫩠䭃此一字治咽腫疾米穀不下書燒灰冷水送下𫩠革食此一字治婦人難產書紙上燒灰米湯送下𫩠餌此一字治小兒夜啼書貼腳心上𫩠餘此一字治遍身虛氣疾書紙上燒灰米湯送下又治產後經脈乳疾𫩠𩚹此一字治蛇蠍咬書紙上貼於疾上立效𫩠飠伍此一字治火燙瘡書紙上燒灰服之貼之立效𫩠飠光此一字治惡瘡書上𫩠飠好𫩠飠神此二字治一切惡瘡於瘡上書三次甚妙𫩠餄𫩠飠禾𫩠飠加此三字治心疼書紙上燒灰艾醋湯送下𫩠𩚣𫩠𫗓𫩠蝕此三字治一切病症用桃枝作筆書紙上燒灰冷水送下如神𫩠餄𫩠飠休𫩠飠功此事三字治心氣疾書紙上燒灰醋湯送下立效𫩠飠食𫩠飠卞𫩠飠用𫩠飠羊此四字治一切走瘡疼處書寫立效𫩠飠斥𫩠飠罰𫩠餓𫩠飠龙𫩠飠病此五字治一切惡瘡疊書六遍醋研墨空心寫又治疔腫發背繞周塗之再用豬膽薑汁二味合塗瘡一夜見效𫩠餘𫩠餂𫩠𩚹𫩠餽𫩠饍𫩠饠此六字治一切疼痛疾處書立效𫩠蝕𫩠餘𫩠餲𫩠餌𫩠飠未𫩠飠月𫩠飠火𫩠𩚣此九字許真君專治惡瘡有妙用筆先取太陽氣唸咒方可𫩠飠下𫩠飠沓𫩠餼𫩠餖𫩠餘𫩠飠敖此六字治無頭瘡咒曰赫赫陽陽日出東方神筆在手萬病泊亡謹請南斗六星北斗七星吾奉太上老君急急如律令勑念三遍用氣一口吹在筆瘡上方可𫩠𩞖𫩠䬷𫩠飠居𫩠飠仲𫩠𫗎𫩠飠谷𫩠飠土𫩠𩜼𫩠餘此九字專治瘧疾並毒瘡焚香咒曰赫赫陽陽日出東方照見十方金童灑水玉女散香一十八般腫毒二十四腫惡瘡不怕刀鏈斧斬虎咬蛇傷一畫不成疽二畫不成瘡三畫諸毒滅四畫通靈所有邪鬼氣即便消滅吾奉太上老君急如律令勑用氣吹一口在身筆或患人衣上背上亦可𫩠飠吏左𫩠飠擯右此二字明白書於心背上𫩠飠乾𫩠飠元𫩠飠享𫩠飠利𫩠飠貞此五字書作一令患人往別處行走遷延良久方歸不要家下筆宜要速快書次日再書如前三次立效又治瘧疾於患人背上臨發日宜早書𫩠𩚹𫩠𩚣𫩠飠天𫩠䭣𫩠飠不𫩠飠許𫩠飠動𫩠飠轉𫩠飠若𫩠飠將𫩠飠便𫩠飠捉此十二字書患者好不好即便隨身聲答應好了𫩠飠弱𫩠飠舉𫩠飰𫩠飠用𫩠䬺𫩠飠使𫩠餔𫩠飠友𫩠飠休此九字乃軒轅黃帝留下治病法系雅哥節使因修黃河堰掘一碑上九字人皆不識專治一切惡瘡口每日於瘡上畫畢後念前咒取太陽氣吹在筆上每日書一字在牆上三次用筆塗之𫩠飠禺正月𫩠飠化二月𫩠餅三月𫩠飯四月𫩠飠解五月𫩠餘六月𫩠餼七月𫩠飠若八月𫩠飠行九月𫩠飠去十月𫩠𫗓十一月𫩠𩛱十二月𫩠食此一字書胙腮腫𫩠餘書頂上𫩠飠下耳根𫩠餔眼𫩠飦手𫩠飠笄腹𫩠餅腿𫩠饠胯𫩠餇腿肚𫩠𩚑眶𫩠飠文背心𫩠飠笑腳節骨𫩠餌胸此十三字俱治腫疾
